apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service-app
  template:
    metadata:
      labels:
        app: ai-service-app
    spec:
      containers:
        - name: ai-service-app
          image: 420905172819.dkr.ecr.ap-south-1.amazonaws.com/ai-service:latest
          envFrom:
            - secretRef:
                name: ai-secret
          env:
            - name: DJANGO_API_BASE
              value: "http://django-backend:8000/api"
            - name: MONGO_URI
              value: "mongodb://mongo-db:27017"
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service-app
spec:
  selector:
    app: ai-service-app
  ports:
    - port: 8001
      targetPort: 8001
