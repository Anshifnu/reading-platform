name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres

    steps:
      # ========================
      # Checkout Code
      # ========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # ========================
      # Backend - Django
      # ========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Django Dependencies
        run: |
          cd django-service
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          cd django-service
          python manage.py test

      # ========================
      # Frontend - React
      # ========================
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # ========================
      # Docker Build
      # ========================
      - name: Build Django Docker Image
        run: docker build -t django-service ./django-service

      - name: Build AI Docker Image
        run: docker build -t ai-service ./ai-service

      - name: Build Chat Docker Image
        run: docker build -t chat-service ./chat-service

      # ========================
      # Deploy to AWS ECR (Only on main branch)
      # ========================
      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker images to Amazon ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag django-service:latest $ECR_REGISTRY/django-service:latest
          docker push $ECR_REGISTRY/django-service:latest
          
          docker tag ai-service:latest $ECR_REGISTRY/ai-service:latest
          docker push $ECR_REGISTRY/ai-service:latest
          
          docker tag chat-service:latest $ECR_REGISTRY/chat-service:latest
          docker push $ECR_REGISTRY/chat-service:latest

      # ========================
      # Continuous Deployment (CD) to Amazon EKS
      # ========================
      - name: Update Kubeconfig
        if: github.ref == 'refs/heads/main'
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl rollout restart deployment django-app
          kubectl rollout restart deployment ai-service-app
          kubectl rollout restart deployment chat-service-web
          kubectl rollout restart deployment celery-worker
          kubectl rollout restart deployment celery-beat
          kubectl rollout restart deployment flower-dashboard
          
          kubectl rollout status deployment django-app